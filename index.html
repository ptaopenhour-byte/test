<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBSH Chromebook Cart Reservation</title>
    
    <!-- 引入 Google Fonts: Nunito 圓體字型，完美契合 Duolingo 風格 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- 引入 Tailwind CSS 並設定自訂主題顏色 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        duo: {
                            green: '#58cc02',
                            greenDark: '#58a700',
                            blue: '#1cb0f6',
                            blueDark: '#1899d6',
                            red: '#ff4b4b',
                            redDark: '#ea2b2b',
                            yellow: '#ffc800',
                            yellowDark: '#e5b400',
                            text: '#4b4b4b',
                            grayLight: '#f7f7f7',
                            grayBorder: '#e5e5e5'
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'duo-green': '0 4px 0 0 #58a700',
                        'duo-blue': '0 4px 0 0 #1899d6',
                        'duo-red': '0 4px 0 0 #ea2b2b',
                        'duo-gray': '0 4px 0 0 #e5e5e5',
                        'duo-card': '0 6px 0 0 #e5e5e5',
                    }
                }
            }
        }
    </script>
    
    <!-- 引入 FontAwesome 用於圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


       <style>
        @media print {
            /* 設定為 A4 橫式，邊緣留 1 公分最安全也最好看 */
            @page { size: A4 landscape; margin: 10mm; }
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            
            /* 【重點】讓每一頁變成一個彈性容器，高度設定為紙張高度的 96% */
            .print-only { display: block !important; width: 100%; }
            .page-break { 
                page-break-after: always; 
                height: 96vh; 
                display: flex; 
                flex-direction: column; 
            }
            
            /* 【重點】讓表格自動長高 (flex-grow: 1)，把 A4 剩下的空間吃滿 */
            table { 
                width: 100%; 
                flex-grow: 1; 
                border-collapse: collapse; 
                table-layout: fixed; 
            }
            
            /* 置中與自動換行 */
            th, td { 
                border: 1px solid #000; 
                text-align: center; 
                vertical-align: middle; /* 讓文字完美置中 */
                font-family: sans-serif; 
                word-wrap: break-word; 
                overflow: hidden;
            }
            
            th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold; }
            
            /* 稍微加寬節次，避免文字太擠 */
            .col-period { width: 65px; } 
            
            .print-lunch { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; letter-spacing: 2px; font-size: 14px; }
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>     
   </head>
<body class="bg-white font-sans text-duo-text selection:bg-duo-green selection:text-white">
    
    <!-- 應用程式根節點 -->
    <div id="root"></div>


    <!-- Firebase 模組載入 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';


        window.fbModules = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>


    <!-- React 應用程式邏輯 -->
    <script type="text/babel">
        const { useState, useEffect } = React;


        // Firebase 環境偵測與設定
        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyC13KFTs6QifMQc0HVsUstfjAmLbpoF0t4",
            authDomain: "cartreserver.firebaseapp.com",
            projectId: "cartreserver",
            storageBucket: "cartreserver.firebasestorage.app",
            messagingSenderId: "86740355319",
            appId: "1:86740355319:web:66828caf35bbdb04f5abf2"
        };


        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cartreserver-app';


        // 加入 order 屬性以預設順序
        const initialData = {
            "Cart 8": { type: "Chromebook", location: "Student Affairs Office", capacity: 30, schedule: {}, notes: "Elevator malfunction, please note", order: 0 },
            "Cart 4": { type: "Chromebook", location: "Student Affairs Office", capacity: 20, schedule: {}, order: 1 },
            "Cart 6": { type: "Chromebook", location: "Subject Building", capacity: 22, notes: "Under maintenance (#04, #08)", schedule: {}, order: 2 },
            "iPad Cart 1": { type: "iPad", location: "Academic Affairs Office", capacity: 21, schedule: {}, order: 3 },
        };


        const initialUsers = {
            "bianca@school.edu": { name: "Bianca", email: "bianca@school.edu", password: "password123", defaultClass: "11A", customClass: "" },
            "yvonne@school.edu": { name: "Yvonne", email: "yvonne@school.edu", password: "password123", defaultClass: "11B", customClass: "" }
        };


        const periods = [
            { id: 1, time: "8:10-9:00", name: "Period 1" },
            { id: 2, time: "9:10-10:00", name: "Period 2" },
            { id: 3, time: "10:10-11:00", name: "Period 3" },
            { id: 4, time: "11:10-12:00", name: "Period 4" },
            { id: "lunch", time: "12:00-13:00", name: "Lunch Break" },
            { id: 5, time: "13:10-14:00", name: "Period 5" },
            { id: 6, time: "14:10-15:00", name: "Period 6" },
            { id: 7, time: "15:20-16:10", name: "Period 7" },
 ];


        const baseDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const classOptions = Array.from({ length: 12 }, (_, i) => [`${i + 1}A`, `${i + 1}B`]).flat();
        classOptions.push("Other (Specify)");


        const getTimestamp = () => {
            return new Date().toLocaleString('en-US', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        };


        function App() {
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [dbRefs, setDbRefs] = useState(null);
            
            const [alertModal, setAlertModal] = useState({ isOpen: false, message: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });


            const showAlert = (message) => setAlertModal({ isOpen: true, message });
            const showConfirm = (message, onConfirm) => setConfirmModal({ isOpen: true, message, onConfirm });


            const [currentView, setCurrentView] = useState('home');
            const [activeFilter, setActiveFilter] = useState('All');
            const [activeLocationFilter, setActiveLocationFilter] = useState('All'); // 新增地點過濾
            const [selectedCart, setSelectedCart] = useState(null);
            const [adminTab, setAdminTab] = useState('carts');
            
            const [semesterConfig, setSemesterConfig] = useState({ startDate: '2026-02-23', totalWeeks: 19 });
            const [tempSemesterConfig, setTempSemesterConfig] = useState({ ...semesterConfig });


            const [selectedWeek, setSelectedWeek] = useState(1);
            const [allowSaturday, setAllowSaturday] = useState(false);
            const [hasAutoSetWeek, setHasAutoSetWeek] = useState(false);
            const currentDays = allowSaturday ? [...baseDays, "Saturday"] : baseDays;


            const [cartData, setCartData] = useState({});
            const [usersDB, setUsersDB] = useState({});
            const [activityLogs, setActivityLogs] = useState([]); 
            
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [authMode, setAuthMode] = useState('login');
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });
            const [regForm, setRegForm] = useState({ name: '', email: '', password: '', classType: '1A', customClass: '' });
            const [adminPwd, setAdminPwd] = useState('');
            
            const [systemAdminPwd, setSystemAdminPwd] = useState('admin');
            const [adminPwdForm, setAdminPwdForm] = useState({ current: '', new: '', confirm: '' });


            const [bookingModal, setBookingModal] = useState({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false });
            const [bookForm, setBookForm] = useState({ classType: '', customClass: '' });
            const [editBookForm, setEditBookForm] = useState({ name: '', email: '', classType: '', customClass: '' });
            const [editCartModal, setEditCartModal] = useState({ isOpen: false, cartName: null, data: null });
            const [printSelection, setPrintSelection] = useState([]);


            useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.fbModules;
                    const app = fb.initializeApp(firebaseConfig);
                    const auth = fb.getAuth(app);
                    const db = fb.getFirestore(app);
                    
                    const getCol = (colName) => isCanvasEnv 
                        ? fb.collection(db, 'artifacts', appId, 'public', 'data', colName)
                        : fb.collection(db, colName);


                    const getDocRef = (colName, docId) => isCanvasEnv
                        ? fb.doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId))
                        : fb.doc(db, colName, String(docId));
                    
                    setDbRefs({ getCol, getDocRef, db, auth, fb });
                    
                    try {
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fb.signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth Error:", e);
                        if (e.code === 'auth/configuration-not-found' || e.code === 'auth/admin-restricted-operation') {
                            setFirebaseReady('auth-error'); 
                            return;
                        }
                    }


                    fb.onAuthStateChanged(auth, (user) => {
                        if (!user) return;
                        
                        fb.onSnapshot(getCol('carts'), (snap) => {
                            const newCarts = {};
                            snap.forEach(d => { newCarts[d.id] = d.data(); });
                            if (snap.empty && !window.__seededCarts) {
                                window.__seededCarts = true;
                                Object.entries(initialData).forEach(([k, v]) => fb.setDoc(getDocRef('carts', k), v).catch(e => {}));
                            } else {
                                setCartData(newCarts);
                            }
                        }, err => console.error("Firestore Error:", err));


                        fb.onSnapshot(getCol('users'), (snap) => {
                            const newUsers = {};
                            snap.forEach(d => { newUsers[d.id] = d.data(); });
                            if (snap.empty && !window.__seededUsers) {
                                window.__seededUsers = true;
                                Object.entries(initialUsers).forEach(([k, v]) => fb.setDoc(getDocRef('users', k), v).catch(e => {}));
                            } else {
                                setUsersDB(newUsers);
                            }
                        }, err => console.error("Firestore Error:", err));


                        fb.onSnapshot(getCol('logs'), (snap) => {
                            const newLogs = [];
                            snap.forEach(d => { newLogs.push({ id: d.id, ...d.data() }); });
                            newLogs.sort((a, b) => b.id - a.id);
                            setActivityLogs(newLogs);
                        }, err => console.error("Firestore Error:", err));


                        fb.onSnapshot(getDocRef('settings', 'main'), (snap) => {
                            if (snap.exists()) {
                                const data = snap.data();
                                if (data.semesterConfig) {
                                    setSemesterConfig(data.semesterConfig);
                                    setTempSemesterConfig(data.semesterConfig);
                                }
                                if (data.systemAdminPwd) setSystemAdminPwd(data.systemAdminPwd);
                                if (data.allowSaturday !== undefined) setAllowSaturday(data.allowSaturday);
                            } else {
                                fb.setDoc(getDocRef('settings', 'main'), {
                                    semesterConfig: { startDate: '2026-02-23', totalWeeks: 19 },
                                    systemAdminPwd: 'admin',
                                    allowSaturday: false
                                }).catch(e => {});
                            }
                            setFirebaseReady(true);
                        }, err => console.error("Firestore Error:", err));
                    });
                };


                if (window.fbModules) initFirebase();
                else window.addEventListener('firebaseLoaded', initFirebase);
            }, []);


            useEffect(() => {
                if (firebaseReady && !hasAutoSetWeek) {
                    const now = new Date();
                    const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                    const start = new Date(year, month - 1, day);
                    start.setHours(0, 0, 0, 0);
                    now.setHours(0, 0, 0, 0);
                    
                    const diffTime = now.getTime() - start.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    let currentWeek = Math.floor(diffDays / 7) + 1;
                    
                    if (currentWeek < 1) currentWeek = 1;
                    if (currentWeek > semesterConfig.totalWeeks) currentWeek = semesterConfig.totalWeeks;
                    
                    setSelectedWeek(currentWeek);
                    setHasAutoSetWeek(true); 
                }
            }, [firebaseReady, semesterConfig, hasAutoSetWeek]);


            useEffect(() => {
                if (selectedWeek > semesterConfig.totalWeeks) setSelectedWeek(semesterConfig.totalWeeks);
            }, [semesterConfig.totalWeeks, selectedWeek]);




            // 核心排序與過濾邏輯
            const sortedAllCarts = Object.entries(cartData).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
            const filteredCarts = sortedAllCarts
                .filter(([name, data]) => activeFilter === 'All' || data.type === activeFilter)
                .filter(([name, data]) => activeLocationFilter === 'All' || data.location === activeLocationFilter);
            
            // 動態擷取所有唯一的所在地點
            const locations = ['All', ...Array.from(new Set(Object.values(cartData).map(c => c.location).filter(Boolean)))];
            
            // 手動排序邏輯 (Admin 專用)
            const moveCart = async (cartName, direction) => {
                const sortedNames = sortedAllCarts.map(arr => arr[0]);
                const idx = sortedNames.indexOf(cartName);
                
                if (direction === 'up' && idx > 0) {
                    [sortedNames[idx - 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx - 1]];
                } else if (direction === 'down' && idx < sortedNames.length - 1) {
                    [sortedNames[idx + 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx + 1]];
                } else {
                    return; // 無法移動
                }
                
                // 批次寫入新順序到 Firestore
                for (let i = 0; i < sortedNames.length; i++) {
                    const cName = sortedNames[i];
                    if ((cartData[cName].order || 0) !== i) {
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', cName), { order: i }, { merge: true });
                    }
                }
            };


            const getIcon = (type) => {
                if (type === 'Chromebook') return <div className="w-12 h-12 bg-duo-blue/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-laptop text-duo-blue text-2xl"></i></div>;
                if (type === 'iPad') return <div className="w-12 h-12 bg-duo-green/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-tablet-screen-button text-duo-green text-2xl"></i></div>;
                return <div className="w-12 h-12 bg-duo-yellow/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-desktop text-duo-yellow text-2xl"></i></div>;
            };


            const addLog = async (action, cart, details, specificUser = null) => {
                const operator = isAdmin ? 'Admin' : (currentUser ? currentUser.name : 'Unknown');
                const id = Date.now().toString();
                const newLog = { time: getTimestamp(), operator: specificUser || operator, action, cart, details };
                if(dbRefs) await dbRefs.fb.setDoc(dbRefs.getDocRef('logs', id), newLog);
            };


            const weeksArray = Array.from({ length: semesterConfig.totalWeeks }, (_, i) => i + 1);
            const getWeekDateRange = (weekNum, includeSat) => {
                const start = new Date(semesterConfig.startDate);
                if (isNaN(start.getTime())) return "Invalid Date";
                start.setDate(start.getDate() + (weekNum - 1) * 7);
                const end = new Date(start);
                end.setDate(end.getDate() + (includeSat ? 5 : 4)); 
                return `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;
            };


            const getDateForDayIdx = (weekNum, dayIdx) => {
                if (!semesterConfig.startDate) return "";
                const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                const date = new Date(year, month - 1, day);
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + (weekNum - 1) * 7 + dayIdx);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            };


            const handleSaturdayToggle = async (e) => {
                const newVal = e.target.checked;
                setAllowSaturday(newVal); 
                if (dbRefs) {
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { allowSaturday: newVal }, { merge: true });
                    addLog(newVal ? "Enable Saturday" : "Disable Saturday", "System", "Admin toggled Saturday booking setting");
                }
            };


            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                if (authMode === 'admin') {
                    if (adminPwd === systemAdminPwd) {
                        setIsAdmin(true);
                        setCurrentUser({ name: 'Admin', email: 'admin@school.edu', defaultClass: 'Admin', customClass: '' });
                        setCurrentView('home');
                        setAdminPwd(''); 
                    } else {
                        showAlert("Incorrect admin password!");
                    }
                } else if (authMode === 'login') {
                    const user = usersDB[loginForm.email];
                    if (user && user.password === loginForm.password) {
                        setCurrentUser(user);
                        setCurrentView('home');
                    } else {
                        showAlert("Incorrect email or password!\nPlease contact the admin if you forgot it.");
                    }
                } else if (authMode === 'register') {
                    if (usersDB[regForm.email]) {
                        showAlert("This email is already registered!");
                        return;
                    }
                    const newUser = {
                        name: regForm.name.trim(), email: regForm.email.trim(), password: regForm.password, defaultClass: regForm.classType, customClass: regForm.customClass
                    };
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('users', newUser.email), newUser);
                    setCurrentUser(newUser);
                    addLog("User Registration", "System", `Registered email: ${newUser.email}`, newUser.name);
                    setCurrentView('home');
                }
            };


            const handleAdminPwdChange = async (e) => {
                e.preventDefault();
                if (adminPwdForm.current !== systemAdminPwd) return showAlert("Current password is incorrect!");
                if (adminPwdForm.new !== adminPwdForm.confirm) return showAlert("New passwords do not match!");
                if (adminPwdForm.new.length < 4) return showAlert("Password must be at least 4 characters long.");
                
                await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { systemAdminPwd: adminPwdForm.new }, { merge: true });
                addLog("Change Password", "System", "Administrator password was updated");
                showAlert("Admin password updated successfully!");
                setAdminPwdForm({ current: '', new: '', confirm: '' });
            };


            const handleSemesterConfigSave = async (e) => {
                e.preventDefault();
                await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { semesterConfig: tempSemesterConfig }, { merge: true });
                addLog("Update Config", "System", `Start Date: ${tempSemesterConfig.startDate}, Total Weeks: ${tempSemesterConfig.totalWeeks}`);
                showAlert("Semester configuration updated successfully!");
            };


            const handleClearSemesterData = () => {
                showConfirm("⚠️ WARNING: Are you sure you want to clear ALL booking records?\n\nThis action cannot be undone!", async () => {
                    for (const cartName of Object.keys(cartData)) {
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', cartName), { ...cartData[cartName], schedule: {} });
                    }
                    setSelectedWeek(1);
                    addLog("Clear Data", "System", "Admin cleared all booking records (New Semester)");
                    showAlert("All booking data has been cleared!");
                });
            };


            const resetUserPassword = (email) => {
                showConfirm(`Reset password for ${usersDB[email].name} to "123456"?`, async () => {
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('users', email), { ...usersDB[email], password: "123456" }, { merge: true });
                    addLog("Reset Password", "System", `Admin reset password for ${email}`);
                    showAlert("Password reset to 123456.");
                });
            };


            const deleteUser = (email) => {
                showConfirm(`Delete user ${usersDB[email].name}?\nThis cannot be undone.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('users', email));
                    addLog("Delete User", "System", `Admin deleted account: ${email}`);
                });
            };


            const handleSlotClick = (dayIdx, periodId, existingBooking) => {
                if (periodId === 'lunch') return; 
                setBookingModal({ isOpen: true, dayIdx, periodId, existingBooking, isEditing: false });
                if (!existingBooking && currentUser) {
                    setBookForm({ classType: currentUser.defaultClass, customClass: currentUser.customClass });
                }
            };


            const submitBooking = async () => {
                const slotId = `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}`;
                const finalClass = bookForm.classType === 'Other (Specify)' ? bookForm.customClass : bookForm.classType;
                
                const updatedSchedule = { ...cartData[selectedCart].schedule };
                updatedSchedule[slotId] = { name: currentUser.name, email: currentUser.email, className: finalClass, ownerEmail: currentUser.email };


                await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', selectedCart), { ...cartData[selectedCart], schedule: updatedSchedule });
                
                addLog("Add Booking", selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (${finalClass})`);
                setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false });
            };


            const cancelBooking = async () => {
                const slotId = `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}`;
                const existing = cartData[selectedCart].schedule[slotId];
                
                const updatedSchedule = { ...cartData[selectedCart].schedule };
                delete updatedSchedule[slotId];


                await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', selectedCart), { ...cartData[selectedCart], schedule: updatedSchedule });
                
                const actionName = isAdmin ? "Force Cancel" : "Cancel Booking";
                addLog(actionName, selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (${existing.name})`);
                
                setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false });
            };


            const handleEditClick = () => {
                const existing = bookingModal.existingBooking;
                const isStandardClass = classOptions.includes(existing.className);
                setEditBookForm({
                    name: existing.name, email: existing.email,
                    classType: isStandardClass ? existing.className : 'Other (Specify)',
                    customClass: isStandardClass ? '' : existing.className
                });
                setBookingModal(prev => ({ ...prev, isEditing: true }));
            };


            const updateBooking = async () => {
                const slotId = `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}`;
                const finalClass = editBookForm.classType === 'Other (Specify)' ? editBookForm.customClass : editBookForm.classType;
                
                const updatedSchedule = { ...cartData[selectedCart].schedule };
                updatedSchedule[slotId] = { name: editBookForm.name, email: editBookForm.email, className: finalClass, ownerEmail: editBookForm.email };


                await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', selectedCart), { ...cartData[selectedCart], schedule: updatedSchedule });
                
                addLog("Admin Edit", selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (Updated: ${editBookForm.name})`);
                setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false });
            };


            const saveCartEdit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const oldName = editCartModal.cartName;
                const newName = formData.get('name');
                const newData = {
                    type: formData.get('type'), location: formData.get('location'), capacity: parseInt(formData.get('capacity')), notes: formData.get('notes'),
                    schedule: oldName && cartData[oldName] ? cartData[oldName].schedule : {},
                    // 若是新設備，將 order 設為當前總數以排在最後面
                    order: oldName && cartData[oldName] && cartData[oldName].order !== undefined ? cartData[oldName].order : Object.keys(cartData).length
                };


                if (oldName && oldName !== newName) {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('carts', oldName));
                }
                await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', newName), newData);
                
                addLog(oldName ? "Edit Equipment" : "Add Equipment", "System", `Equipment: ${newName}`);
                setEditCartModal({ isOpen: false, cartName: null, data: null });
            };


            const deleteCart = (name) => {
                showConfirm(`Delete "${name}"?\nThis clears all its bookings.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('carts', name));
                    addLog("Delete Equipment", "System", `Equipment: ${name}`);
                    if (selectedCart === name) setSelectedCart(null);
                });
            };


            const getMyBookings = () => {
                const myBookings = [];
                if (!currentUser) return myBookings;
                
                Object.entries(cartData).forEach(([cartName, data]) => {
                    if (data.schedule) {
                        Object.entries(data.schedule).forEach(([slotId, bookingInfo]) => {
                            if (bookingInfo.ownerEmail === currentUser.email) {
                                const match = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                                if (match) {
                                    myBookings.push({
                                        cartName,
                                        week: parseInt(match[1]),
                                        dayIdx: parseInt(match[2]),
                                        periodId: match[3],
                                        slotId,
                                        className: bookingInfo.className
                                    });
                                }
                            }
                        });
                    }
                });


                myBookings.sort((a, b) => {
                    if (a.week !== b.week) return a.week - b.week;
                    if (a.dayIdx !== b.dayIdx) return a.dayIdx - b.dayIdx;
                    const pA = periods.findIndex(p => p.id == a.periodId);
                    const pB = periods.findIndex(p => p.id == b.periodId);
                    return pA - pB;
                });
                
                return myBookings;
            };


            const cancelBookingFromList = (cartName, slotId, className) => {
                showConfirm(`Are you sure you want to cancel this booking for ${cartName}?`, async () => {
                    const updatedSchedule = { ...cartData[cartName].schedule };
                    delete updatedSchedule[slotId];
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', cartName), { ...cartData[cartName], schedule: updatedSchedule });
                    
                    const match = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                    if (match) {
                        addLog("Cancel Booking", cartName, `W${match[1]} ${currentDays[parseInt(match[2])]} P${match[3]} (${className})`);
                    }
                });
            };


            // Firebase Error Screen (Duolingo Style)
            if (firebaseReady === 'auth-error') {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] max-w-lg text-center">
                            <i className="fa-solid fa-triangle-exclamation text-duo-red text-6xl mb-4"></i>
                            <h2 className="text-2xl font-extrabold text-duo-text mb-4">Firebase Setup Incomplete</h2>
                            <p className="text-duo-text/80 mb-6 text-left leading-relaxed font-bold">
                                Authentication is disabled in your Firebase console.<br/><br/>
                                <span className="text-duo-blue uppercase tracking-wider text-sm">How to fix:</span><br/>
                                1. Go to Firebase Console -> <strong>Authentication</strong>.<br/>
                                2. Click <strong>Sign-in method</strong>.<br/>
                                3. Enable <strong>Anonymous</strong> provider.<br/>
                                4. Save and refresh this page.
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full bg-duo-green text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#58a700] active:shadow-none active:translate-y-[4px] transition-all tracking-wider">
                                Refresh Page
                            </button>
                        </div>
                    </div>
                );
            }


            if (!firebaseReady) {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex flex-col items-center justify-center">
                        <i className="fa-solid fa-spinner fa-spin text-duo-green text-6xl mb-6"></i>
                        <h2 className="text-2xl font-extrabold text-duo-text tracking-wide">Loading...</h2>
                    </div>
                );
            }


            // ================= LOGIN SCREEN (Duolingo Style) =================
            if (!currentUser && !isAdmin) {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex items-center justify-center p-4">
                        <div className="w-full max-w-md">
                            <div className="text-center mb-8">
                                <div className="inline-block bg-white p-4 rounded-3xl border-2 border-duo-grayBorder shadow-[0_6px_0_0_#e5e5e5] mb-4">
                                    <i className="fa-solid fa-laptop-chromebook text-duo-green text-5xl"></i>
                                </div>
                                <h1 className="text-3xl font-extrabold text-duo-text tracking-tight">Equipment Hub</h1>
                                <p className="text-duo-text/60 font-bold mt-2">{authMode === 'login' ? 'Let\'s get booking!' : authMode === 'register' ? 'Create an account' : 'Admin Access'}</p>
                            </div>


                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] p-8">
                                {authMode !== 'login' && (
                                    <button onClick={() => setAuthMode('login')} className="text-duo-grayBorder hover:text-duo-text font-bold mb-6 flex items-center uppercase tracking-wider text-sm transition-colors">
                                        <i className="fa-solid fa-chevron-left mr-2"></i> Back
                                    </button>
                                )}


                                <form onSubmit={handleAuthSubmit} className="space-y-5">
                                    {authMode === 'login' && (
                                        <>
                                            <div>
                                                <label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2">Email Address</label>
                                                <input required type="email" value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} className="w-full px-5 py-4 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold text-duo-text transition-all" placeholder="name@school.edu" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2 flex justify-between">
                                                    <span>Password</span>
                                                </label>
                                                <input required type="password" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full px-5 py-4 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold text-duo-text transition-all" placeholder="••••••••" />
                                            </div>
                                            <button type="submit" className="w-full mt-2 bg-duo-green text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#58a700] hover:bg-[#46a302] active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg">
                                                Log In
                                            </button>
                                            
                                            <div className="pt-6 mt-6 border-t-2 border-duo-grayBorder flex flex-col gap-3">
                                                <button type="button" onClick={() => setAuthMode('register')} className="w-full bg-white text-duo-blue font-extrabold uppercase py-3 rounded-2xl border-2 border-duo-grayBorder shadow-[0_4px_0_0_#e5e5e5] hover:bg-blue-50 active:shadow-none active:translate-y-[4px] transition-all tracking-wider">
                                                    Create Account
                                                </button>
                                                <button type="button" onClick={() => setAuthMode('admin')} className="w-full text-duo-text/40 font-bold uppercase tracking-wider text-sm hover:text-duo-text mt-2 transition-colors">
                                                    <i className="fa-solid fa-shield-halved mr-1"></i> Admin Portal
                                                </button>
                                            </div>
                                        </>
                                    )}
                                    {authMode === 'register' && (
                                        <>
                                            <div><label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2">Full Name</label><input required type="text" value={regForm.name} onChange={e => setRegForm({...regForm, name: e.target.value})} className="w-full px-5 py-3 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold transition-all" /></div>
                                            <div><label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2">Email (Login ID)</label><input required type="email" value={regForm.email} onChange={e => setRegForm({...regForm, email: e.target.value})} className="w-full px-5 py-3 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold transition-all" /></div>
                                            <div><label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2">Set Password</label><input required type="password" minLength="6" value={regForm.password} onChange={e => setRegForm({...regForm, password: e.target.value})} placeholder="At least 6 chars" className="w-full px-5 py-3 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold transition-all" /></div>
                                            <div><label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2">Default Class/Dept</label><select value={regForm.classType} onChange={e => setRegForm({...regForm, classType: e.target.value})} className="w-full px-5 py-3 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold transition-all appearance-none">{classOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select></div>
                                            {regForm.classType === 'Other (Specify)' && <input required type="text" value={regForm.customClass} onChange={e => setRegForm({...regForm, customClass: e.target.value})} placeholder="Specify Department" className="w-full px-5 py-3 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-blue outline-none font-bold transition-all mt-2" />}
                                            <button type="submit" className="w-full mt-4 bg-duo-blue text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#1899d6] hover:bg-[#1899d6] active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg">
                                                Register
                                            </button>
                                        </>
                                    )}
                                    {authMode === 'admin' && (
                                        <>
                                            <div><label className="block text-xs font-extrabold text-duo-text/50 uppercase tracking-wider mb-2 text-center">Admin Password</label><input required type="password" value={adminPwd} onChange={e => setAdminPwd(e.target.value)} className="w-full px-5 py-4 bg-duo-grayLight border-2 border-duo-grayBorder rounded-2xl focus:bg-white focus:border-duo-text outline-none font-bold text-duo-text transition-all text-center tracking-widest text-lg" autoFocus /></div>
                                            <button type="submit" className="w-full mt-4 bg-duo-text text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#2b2b2b] hover:bg-black active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg">
                                                Enter Dashboard
                                            </button>
                                        </>
                                    )}
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }


            // ================= MAIN APP (Duolingo Style) =================
            return (
                <div className="min-h-screen bg-[#ffffff]">
                    {/* Header */}
                    <header className="bg-white border-b-2 border-duo-grayBorder sticky top-0 z-10 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => setCurrentView('home')}>
                                <i className="fa-solid fa-cube text-duo-green text-3xl group-hover:scale-110 transition-transform"></i>
                                <h1 className="text-2xl font-extrabold text-duo-green tracking-tight hidden sm:block">IBSH Chromebook Carts Reservation</h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button onClick={() => setCurrentView('print')} className="px-4 py-2.5 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase tracking-wider rounded-2xl shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px] transition-all text-xs sm:text-sm">
                                    <i className="fa-solid fa-print sm:mr-1"></i> <span className="hidden sm:inline">Print</span>
                                </button>


                                <button onClick={() => setCurrentView('my-bookings')} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'my-bookings' ? 'bg-duo-blue text-white shadow-[0_4px_0_0_#1899d6] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-blue shadow-[0_4px_0_0_#e5e5e5] hover:bg-blue-50 active:shadow-none active:translate-y-[4px]'}`}>
                                    <i className="fa-solid fa-calendar-check sm:mr-1"></i> <span className="hidden sm:inline">My Bookings</span>
                                </button>


                                {isAdmin && (
                                    <button onClick={() => { setCurrentView('admin'); setAdminTab('carts'); }} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'admin' ? 'bg-duo-text text-white shadow-[0_4px_0_0_#2b2b2b] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-text shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px]'}`}>
                                        <i className="fa-solid fa-gear sm:mr-1"></i> <span className="hidden sm:inline">Admin</span>
                                    </button>
                                )}
                                
                                {/* User Profile Pill */}
                                <div className="flex items-center ml-2 border-2 border-duo-grayBorder rounded-2xl h-[44px] overflow-hidden bg-duo-grayLight">
                                    <div className="px-4 font-extrabold text-duo-blue text-sm flex items-center h-full">
                                        <i className={`fa-solid ${isAdmin ? 'fa-shield-halved text-duo-yellow' : 'fa-user'} mr-2`}></i>
                                        {currentUser.name}
                                    </div>
                                    <button onClick={() => { setCurrentUser(null); setIsAdmin(false); setAuthMode('login'); }} className="px-4 h-full border-l-2 border-duo-grayBorder text-gray-400 hover:text-duo-red hover:bg-red-50 transition-colors" title="Log Out">
                                        <i className="fa-solid fa-right-from-bracket"></i>
                                    </button>
                                </div>
                            </div>
                        </div>


                        {/* Global Config Bar */}
                        <div className="bg-duo-grayLight border-t-2 border-duo-grayBorder px-4 py-3">
                            <div className="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
                                <div className="flex items-center space-x-3">
                                    <span className="font-extrabold text-duo-text/60 uppercase tracking-wider text-sm">Week:</span>
                                    <div className="relative">
                                        <select value={selectedWeek} onChange={(e) => setSelectedWeek(Number(e.target.value))} className="appearance-none bg-white border-2 border-duo-grayBorder rounded-xl pl-4 pr-10 py-2 text-sm font-extrabold text-duo-blue outline-none cursor-pointer hover:bg-gray-50 transition-colors">
                                            {weeksArray.map(w => (
                                                <option key={w} value={w}>Wk {w} ({getWeekDateRange(w, allowSaturday)})</option>
                                            ))}
                                        </select>
                                        <i className="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-duo-grayBorder pointer-events-none text-xs"></i>
                                    </div>
                                </div>
                                {isAdmin && (
                                    <div className="flex items-center">
                                        <label className="flex items-center cursor-pointer space-x-3 text-sm font-extrabold text-duo-text/80 uppercase tracking-wider">
                                            <span>Sat. Booking</span>
                                            <div className="relative">
                                                <input type="checkbox" checked={allowSaturday} onChange={handleSaturdayToggle} className="sr-only" />
                                                <div className={`block w-14 h-8 rounded-full border-2 transition-colors ${allowSaturday ? 'bg-duo-green border-duo-greenDark' : 'bg-duo-grayBorder border-gray-300'}`}></div>
                                                <div className={`dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${allowSaturday ? 'transform translate-x-6' : ''}`}></div>
                                            </div>
                                        </label>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>


                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-8 no-print">
                        
                        {/* --- View: My Bookings --- */}
                        {currentView === 'my-bookings' && (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <div className="mb-8 border-b-2 border-duo-grayBorder pb-6 flex items-center justify-between">
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-duo-text tracking-tight">My Bookings</h2>
                                        <p className="text-gray-500 font-bold mt-2">Manage all your reserved equipment slots here.</p>
                                    </div>
                                </div>


                                {getMyBookings().length === 0 ? (
                                    <div className="bg-white rounded-3xl border-2 border-duo-grayBorder shadow-duo-card p-12 text-center flex flex-col items-center">
                                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6 border-4 border-white shadow-sm">
                                            <i className="fa-regular fa-face-frown-open text-5xl text-gray-300"></i>
                                        </div>
                                        <h3 className="text-2xl font-extrabold text-duo-text mb-2">No Bookings Yet</h3>
                                        <p className="text-gray-500 font-bold mb-8">You haven't reserved any equipment for your classes.</p>
                                        <button onClick={() => setCurrentView('home')} className="px-8 py-4 bg-duo-green text-white font-extrabold uppercase tracking-wider rounded-2xl shadow-duo-green hover:bg-[#46a302] active:shadow-none active:translate-y-[4px] transition-all">
                                            <i className="fa-solid fa-magnifying-glass mr-2"></i> Find Equipment
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                        {getMyBookings().map((b, idx) => {
                                            const targetPeriod = periods.find(p => p.id == b.periodId);
                                            return (
                                                <div key={idx} className="bg-white rounded-3xl border-2 border-duo-grayBorder shadow-[0_6px_0_0_#e5e5e5] p-5 flex flex-col relative overflow-hidden group hover:border-duo-blue transition-colors">
                                                    <div className="absolute top-0 left-0 w-2 h-full bg-duo-blue"></div>
                                                    
                                                    <div className="flex justify-between items-start pl-2 mb-3">
                                                        <div>
                                                            <h3 className="font-extrabold text-xl text-duo-text flex items-center">
                                                                {getIcon(cartData[b.cartName].type)}
                                                                <span className="ml-3">{b.cartName}</span>
                                                            </h3>
                                                        </div>
                                                        <span className="bg-blue-50 text-duo-blue text-xs px-2.5 py-1 rounded-lg font-extrabold uppercase tracking-wider border-2 border-blue-100">
                                                            {b.className}
                                                        </span>
                                                    </div>


                                                    <div className="pl-2 space-y-2 mb-6">
                                                        <div className="flex items-center text-sm font-bold text-gray-500">
                                                            <div className="w-6"><i className="fa-regular fa-calendar text-gray-400"></i></div>
                                                            <span className="bg-gray-100 px-2 py-0.5 rounded-md mr-2 text-duo-text">Wk {b.week}</span> 
                                                            {currentDays[b.dayIdx]} ({getDateForDayIdx(b.week, b.dayIdx)})
                                                        </div>
                                                        <div className="flex items-center text-sm font-bold text-gray-500">
                                                            <div className="w-6"><i className="fa-regular fa-clock text-gray-400"></i></div>
                                                            <span className="text-duo-text">{targetPeriod ? targetPeriod.name : `Period ${b.periodId}`}</span>
                                                            <span className="text-xs ml-2">({targetPeriod ? targetPeriod.time : ''})</span>
                                                        </div>
                                                    </div>


                                                    <button onClick={() => cancelBookingFromList(b.cartName, b.slotId, b.className)} className="mt-auto w-full bg-white text-duo-red font-extrabold uppercase py-3 rounded-xl border-2 border-duo-grayBorder shadow-[0_4px_0_0_#e5e5e5] hover:bg-red-50 hover:border-red-200 active:shadow-none active:translate-y-[4px] transition-all flex items-center justify-center">
                                                        <i className="fa-solid fa-trash-can mr-2"></i> Cancel
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}


                        {/* --- View: Home --- */}
                        {currentView === 'home' && (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <div className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b-2 border-duo-grayBorder pb-6">
                                    <div className="flex-1">
                                        <h2 className="text-3xl font-extrabold text-duo-text tracking-tight">Choose Equipment</h2>
                                    </div>
                                    <div className="flex flex-wrap items-center gap-3">
                                        <div className="flex gap-2 overflow-x-auto hide-scrollbar py-2">
                                            {['All', 'Chromebook', 'iPad', 'PC Lab'].map(filter => (
                                                <button key={filter} onClick={() => setActiveFilter(filter)} className={`px-5 py-2.5 rounded-2xl font-extrabold uppercase tracking-wider text-sm transition-all whitespace-nowrap ${activeFilter === filter ? 'bg-duo-blue/10 text-duo-blue border-2 border-duo-blue' : 'bg-white text-gray-400 border-2 border-duo-grayBorder hover:bg-gray-50'}`}>
                                                    {filter}
                                                </button>
                                            ))}
                                        </div>
                                        
                                        {/* Location Filter Dropdown */}
                                        <div className="relative border-l-2 border-duo-grayBorder pl-3">
                                            <select value={activeLocationFilter} onChange={e => setActiveLocationFilter(e.target.value)} className="appearance-none bg-white border-2 border-duo-grayBorder rounded-2xl pl-4 pr-10 py-2.5 font-extrabold text-gray-500 hover:text-duo-text outline-none cursor-pointer hover:bg-gray-50 transition-colors text-sm uppercase tracking-wider max-w-[200px] truncate">
                                                {locations.map(loc => (
                                                    <option key={loc} value={loc}>{loc === 'All' ? '📍 All Locations' : loc}</option>
                                                ))}
                                            </select>

                                                    <thead className="bg-duo-grayLight border-b-2 border-duo-grayBorder">
                                                        <tr><th className="p-4 text-xs font-extrabold text-gray-400 uppercase tracking-wider">Name</th><th className="p-4 text-xs font-extrabold text-gray-400 uppercase tracking-wider">Email</th><th className="p-4 text-xs font-extrabold text-gray-400 uppercase tracking-wider">Class</th><th className="p-4 text-right text-xs font-extrabold text-gray-400 uppercase tracking-wider">Actions</th></tr>

                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                                        <button type="submit" className="w-full mt-2 bg-duo-green text-white font-extrabold uppercase py-3 rounded-2xl shadow-duo-green active:shadow-none active:translate-y-[4px] transition-all tracking-wider">Save Config</button>
                                                    </form>

                                                    <button onClick={handleClearSemesterData} className="w-full bg-duo-red text-white font-extrabold uppercase py-3 rounded-2xl shadow-duo-red active:shadow-none active:translate-y-[4px] transition-all tracking-wider">
                                                        <i className="fa-solid fa-bomb mr-2"></i> Clear Bookings
                                                    </button>

                                            </div>


                                            <div className="flex-1">

                                                    <form onSubmit={handleAdminPwdChange} className="space-y-4">
                                                        <div><label className="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">Current</label><input required type="password" value={adminPwdForm.current} onChange={e => setAdminPwdForm({...adminPwdForm, current: e.target.value})} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold text-duo-text" /></div>
                                                        <div><label className="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">New</label><input required type="password" value={adminPwdForm.new} onChange={e => setAdminPwdForm({...adminPwdForm, new: e.target.value})} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold text-duo-text" /></div>
                                                        <div><label className="block text-xs font-extrabold text-gray-500 uppercase tracking-wider mb-2">Confirm</label><input required type="password" value={adminPwdForm.confirm} onChange={e => setAdminPwdForm({...adminPwdForm, confirm: e.target.value})} className="w-full px-4 py-3 bg-white border-2 border-duo-grayBorder rounded-xl focus:border-duo-blue outline-none font-bold text-duo-text" /></div>
                                                        <button type="submit" className="w-full mt-2 bg-duo-text text-white font-extrabold uppercase py-3 rounded-2xl shadow-[0_4px_0_0_#2b2b2b] hover:bg-black active:shadow-none active:translate-y-[4px] transition-all tracking-wider">Update</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        {/* --- View: Print Selection --- */}

                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-8">

                                            </div>
                                        );
                                    })}

                                    <button onClick={() => window.print()} disabled={printSelection.length===0} className="px-8 py-4 bg-duo-blue text-white font-extrabold uppercase tracking-wider rounded-2xl shadow-[0_4px_0_0_#1899d6] active:shadow-none active:translate-y-[4px] disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg">
                                        Start Printing ({printSelection.length})
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>


                  {/* ================= Print Only Section ================= */}
<div className="hidden print-only w-full">

                        ))}

                    <tr>
                        {/* 產生每天下面的三個子標題 */}
